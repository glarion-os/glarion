# /etc/modprobe.d/amdgpu.conf
# AMD GPU configuration for Glarion
# Tuned for Radeon 780M (RDNA 3 integrated) on Ryzen 9 7940HS

# Enable all power management features
# Required for ryzenadj TDP control to work correctly
options amdgpu ppfeaturemask=0xffffffff

# Enable DC (Display Core) for proper display output
options amdgpu dc=1

# Enable GPU reset on hang rather than full system hang
options amdgpu gpu_recovery=1

# Audio over HDMI/DisplayPort
options amdgpu audio=1
