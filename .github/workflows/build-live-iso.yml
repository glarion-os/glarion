name: Build Live ISO

on:
  workflow_dispatch:

concurrency:
  group: build-live-iso
  cancel-in-progress: true

env:
  IMAGE_NAME: glarion
  IMAGE_REGISTRY: ghcr.io/${{ github.repository_owner }}

jobs:
  build-live-iso:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      R2_BUCKET: ${{ secrets.R2_BUCKET }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Free up runner disk space
        run: |
          sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc /usr/local/.ghcup /opt/hostedtoolcache/CodeQL
          sudo docker image prune -af
          df -h /

      - name: Checkout Titanoboa
        uses: actions/checkout@v4
        with:
          repository: ublue-os/titanoboa
          ref: 840217d97bd0bc9a52466508c54d8dda5c5ba2fd # v0.2
          path: titanoboa

      # Titanoboa v0.2's action installs the latest just, but its Justfile
      # only parses with just <= 1.51 (1.52 gated which() behind `set lists`),
      # so run the same build with a pinned just instead of using the action.
      - name: Install just
        run: |
          curl -sL https://github.com/casey/just/releases/download/1.51.0/just-1.51.0-x86_64-unknown-linux-musl.tar.gz | tar -xz just
          sudo mv just /usr/local/bin/just

      - name: Build ISO
        working-directory: titanoboa
        run: |
          sudo \
            PATH="$PATH" \
            CI=true \
            HOOK_post_rootfs= \
            HOOK_pre_initramfs= \
            TITANOBOA_BUILDER_DISTRO=fedora \
            just build \
            "${IMAGE_REGISTRY}/${IMAGE_NAME}:latest" 1 "${GITHUB_WORKSPACE}/config/flatpaks.list" squashfs '' '' 1
          sudo chown "$(id -u):$(id -g)" output.iso
          mv output.iso "${GITHUB_WORKSPACE}/glarion-live.iso"

      - name: Generate checksum
        run: |
          mkdir -p dist
          mv glarion-live.iso dist/
          cd dist
          sha256sum glarion-live.iso > glarion-live.iso.sha256
          ls -lh
          df -h /

      - name: Upload to R2
        # Skipped when the R2 secrets are not configured, so the ISO build
        # itself can be exercised before the bucket exists.
        if: env.R2_BUCKET != ''
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          AWS_REQUEST_CHECKSUM_CALCULATION: when_required
          AWS_RESPONSE_CHECKSUM_VALIDATION: when_required
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
        run: |
          aws s3 cp dist/ "s3://${R2_BUCKET}/" --recursive --endpoint-url "${R2_ENDPOINT}"
