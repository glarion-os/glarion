stages:
  - build

variables:
  FEDORA_MAJOR_VERSION: "44"
  BUILDAH_ISOLATION: chroot
  STORAGE_DRIVER: vfs

build-and-push:
  stage: build
  image: quay.io/buildah/stable:latest
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
    - if: '$CI_PIPELINE_SOURCE == "web"'
    - if: '$CI_MERGE_REQUEST_IID'
  before_script:
    - buildah login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
  script:
    - |
      if [ -n "$CI_MERGE_REQUEST_IID" ]; then
        TAGS="$CI_REGISTRY_IMAGE:mr-$CI_MERGE_REQUEST_IID"
        PUSH=false
      else
        TAGS="$CI_REGISTRY_IMAGE:latest $CI_REGISTRY_IMAGE:$FEDORA_MAJOR_VERSION $CI_REGISTRY_IMAGE:sha-$CI_COMMIT_SHORT_SHA"
        PUSH=true
      fi

      TAG_ARGS=""
      for TAG in $TAGS; do
        TAG_ARGS="$TAG_ARGS --tag $TAG"
      done

      buildah build \
        --build-arg FEDORA_MAJOR_VERSION=$FEDORA_MAJOR_VERSION \
        $TAG_ARGS \
        .

      if [ "$PUSH" = "true" ]; then
        for TAG in $TAGS; do
          buildah push "$TAG"
        done
      fi

# Note: configure a weekly schedule (Mon 04:00 UTC) in GitLab CI/CD > Schedules
# to rebuild automatically and pick up upstream Kinoite updates.
